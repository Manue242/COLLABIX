services:
  # ==========================================
  # 1. ZONE DE STOCKAGE MÉDIA (Géré par CYBER 1 & 3)
  # ==========================================
  video-storage:
    image: nginx:alpine
    container_name: hackathon-nginx-media
    ports:
      - "80:80" # Ton port 80 pour tes tests de logs en direct
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./media:/usr/share/nginx/html/videos:ro # CORRIGÉ : Aligné avec le dossier /videos/ de nginx.conf
    networks:
      - backend-network # Isolé du Front, seul le Back peut y accéder en interne
    restart: unless-stopped

  # ==========================================
  # 2. ZONE DE DONNÉES (Ajoutée par le Dev Backend)
  # ==========================================
  db:
    image: postgres:16-alpine
    container_name: hackathon-db
    environment:
      POSTGRES_USER: collabix
      POSTGRES_PASSWORD: collabix
      POSTGRES_DB: collabix
    ports:
      - "5432:5432" # Optionnel pour le dev, mais sécurisé par le réseau interne
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collabix -d collabix"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend-network # La base de données est cachée dans le réseau privé

  # ==========================================
  # 3. LE BACKEND (FastAPI - Adapté en passerelle sécurisée)
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile # Utilise ton Dockerfile sécurisé avec appuser !
    container_name: hackathon-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env # On pointe vers son fichier de configuration
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy # Attend que la DB soit prête avant de démarrer
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\" 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s
    networks:
      - backend-network # CORRIGÉ : indispensable pour l'accès à la DB et à Nginx

  # ==========================================
  # 4. ZONE IA & INDEXATION
  # ==========================================
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_models:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    networks:
      - backend-network

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: >
      sh -c "until ollama list >/dev/null 2>&1; do echo 'waiting for ollama...'; sleep 2; done; ollama pull llama3.2"
    restart: "no"
    networks:
      - backend-network

  ai-api:
    build: ./ai-data/indexation-semantique
    ports:
      - "8080:8080"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - hf_cache:/root/.cache/huggingface
      - whisper_cache:/root/.cache/whisper
      - chroma_data:/app/chroma_db
    depends_on:
      - ollama
    restart: unless-stopped
    networks:
      - backend-network

  # ==========================================
  # 5. INTERFACE UTILISATEUR
  # ==========================================
  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://localhost:8000 # Interroge le backend via le navigateur de l'hôte
      - VITE_AI_URL=http://localhost:8080      # Interroge l'API IA via le navigateur de l'hôte
    command: sh -c "npm install && npm run dev"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend-network # Côté public pour répondre au client React
      - backend-network  # Côté privé pour parler à la DB et à Nginx

  # ==========================================
  # 6. ZONE DE TEST (Pour les validations automatiques)
  # ==========================================
  tests:
    build: ./backend
    container_name: hackathon-tests
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "pip install -r requirements-dev.txt -q && pytest -v"
    profiles:
      - test
    networks:
      - backend-network # Les tests s'exécutent en zone isolée

volumes:
  postgres_data:
  ollama_models:
  hf_cache:
  whisper_cache:
  chroma_data:

# ==========================================
# CONFIGURATION DES RÉSEAUX ET VOLUMES
# ==========================================
networks:
  frontend-network:
    driver: bridge # Zone d'accès Utilisateur <-> Frontend/Backend
  backend-network:
    driver: bridge # Zone de Confiance (VPC) Backend <-> DB <-> Nginx Media