events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ----------------------------
    # Durcissement Nginx
    # ----------------------------
    server_tokens off;
    sendfile on;
    keepalive_timeout 65;

    # ----------------------------
    # Logs personnalisés
    # ----------------------------
    log_format cyber_monitoring
        '[$time_local] [MONITORING-ARCY-CYBER3] '
        'IP=$remote_addr '
        'Method=$request_method '
        'Request="$request" '
        'Status=$status '
        'Bytes=$body_bytes_sent '
        'Referer="$http_referer" '
        'UserAgent="$http_user_agent"';

    access_log /dev/stdout cyber_monitoring;
    error_log  /dev/stderr warn;

    server {

        listen 80;
        server_name localhost;

        # ---------------------------------
        # En-têtes de sécurité
        # ---------------------------------

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ---------------------------------
        # Autoriser uniquement GET et HEAD
        # ---------------------------------

        if ($request_method !~ ^(GET|HEAD)$) {
            return 405;
        }

        # ---------------------------------
        # Interdiction d'accès aux dossiers sensibles
        # ---------------------------------

        location /secrets/ {
            return 403;
        }

        location ~* \.(key)$ {
            return 403;
        }

        location ~* key_info\.txt$ {
            return 403;
        }

        # ---------------------------------
        # Proxy vers le backend (Cyber 2)
        # ---------------------------------

        location = /api/video/key {

            proxy_pass http://backend:8000/api/video/key;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---------------------------------
        # Diffusion des vidéos HLS
        # ---------------------------------

        location /videos/ {

            alias /usr/share/nginx/html/videos/;

            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }

            add_header Cache-Control "no-cache";

            autoindex off;
        }

        # ---------------------------------
        # Page par défaut
        # ---------------------------------

        location / {

            root /usr/share/nginx/html;
            index index.html;
        }

        # ---------------------------------
        # Pages d'erreur
        # ---------------------------------

        error_page 403 /403.html;
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
    }
}