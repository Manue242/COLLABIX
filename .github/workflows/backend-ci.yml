name: Backend CI

on:
  push:
    branches:
      - develop
    paths:
      - "backend/**"
  pull_request:
    branches:
      - develop
    paths:
      - "backend/**"

jobs:
  test:
    name: Run backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: collabix
          POSTGRES_PASSWORD: collabix
          POSTGRES_DB: collabix_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U collabix -d collabix_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://collabix:collabix@localhost:5432/collabix_test?ssl=false
          JWT_SECRET: ci-secret-key
          DATABASE_URL: postgresql+asyncpg://collabix:collabix@localhost:5432/collabix_test?ssl=false
        run: pytest -v
