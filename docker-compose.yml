services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: collabix
      POSTGRES_PASSWORD: collabix
      POSTGRES_DB: collabix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collabix -d collabix"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\" 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
    command: sh -c "npm install && npm run dev"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  tests:
    build: ./backend
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "pip install -r requirements-dev.txt -q && pytest -v"
    profiles:
      - test

volumes:
  postgres_data:
